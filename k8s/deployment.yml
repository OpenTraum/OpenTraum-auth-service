apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: opentraum
  labels:
    app: auth-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: auth
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: auth
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: auth-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-auth-service:34105e35eff13993972f3aad4383b449d24708d5
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: DB_HOST
              value: "opentraum-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "opentraum_auth"
            - name: DB_USERNAME
              value: "opentraum"
            - name: DB_PASSWORD
              value: "opentraum"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      restartPolicy: Always